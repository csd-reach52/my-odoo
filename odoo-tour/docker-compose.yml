services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  web:
      image: odoo:18.0
      depends_on:
        - db
      ports:
        - "8069:8069"
      volumes:
        - odoo-web-data:/var/lib/odoo
        - ./config:/etc/odoo            # This links your Windows config folder
        - ./addons:/mnt/extra-addons
      environment:
        - HOST=db
        - USER=odoo
        - PASSWORD=odoo
      # This command tells Odoo specifically to use your config file
      command: odoo -c /etc/odoo/odoo.conf

# THIS PART IS MISSING OR MISALIGNED:
volumes:
  odoo-web-data:
  odoo-db-data: